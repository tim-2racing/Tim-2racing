<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIM-2 RACING</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="lines"></div>

    <h1 class="logo-text">TIM-2 RACING</h1>
    <p class="subtitle">Driven to win</p>

    <nav>
        <button onclick="scrollToSection('about')">О команде</button>
        <button onclick="goPage('academy')">Академия</button>
        <button onclick="scrollToSection('contact')">Контакты</button>
    </nav>
</header>

<section id="about" class="fade">
    <h2>О команде</h2>
    <p>Мы — TIM-2 Racing. Будущая гоночная команда и академия пилотов.</p>
</section>

<section id="contact" class="fade">
    <h2>Контакты</h2>
    <p>TikTok: www.tiktok.com/@tim2racing.academy</p>
</section>

<footer>
    <p>© TIM-2 RACING</p>
</footer>

<script>
function scrollToSection(id) {
    const element = document.getElementById(id);
    if (element) {
        element.scrollIntoView({ behavior: 'smooth' });
    }
}

function goPage(page) {
    alert('Страница "' + page + '" в разработке!');
}

const fades = document.querySelectorAll('.fade');

function checkFade() {
    fades.forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight - 100) {
            el.classList.add('show');
        }
    });
}

window.addEventListener('scroll', checkFade);
window.addEventListener('load', checkFade);
</script>

</body>
</html>
